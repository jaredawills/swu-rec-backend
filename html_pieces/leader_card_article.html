<article class="card-tile"
               data-type="%card_type"
               data-aspect="%aspects"
               data-set="%set_code"
               data-usage='{"3":%copy3,"2":%copy2,"1":%copy1}'>
        <div class="card-image-wrapper">
          <img src="%front_art" alt="%title">
        </div>
        <div class="card-body">
          <div class="card-name">%title</div>
          <div class="card-sub">
            <span>%subtitle</span>
          </div>
          <div class="card-sub">
            <span>%card_type</span>
            <span>%card_num</span>
          </div>
          <div class="usage-stats"></div>
        </div>
      </article>
